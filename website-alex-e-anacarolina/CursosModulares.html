    <script>
    const cursosInfo = {
        "Agrimensura": "Curso voltado para medição e mapeamento de terrenos. O aluno aprende a usar equipamentos como GPS e estação total para criar mapas e plantas. Atua em obras, loteamentos e projetos de infraestrutura",
        "Meio Ambiente": "Focado na preservação ambiental e sustentabilidade. O estudante aprende a analisar água, solo e ar, além de desenvolver projetos ecológicos. Pode trabalhar com controle ambiental e cumprimento de leis ambientais.",
        "Segurança do Trabalho" : "Ensina a prevenir acidentes e garantir a segurança nas empresas. O aluno aprende a identificar riscos, orientar trabalhadores e fiscalizar o uso de equipamentos de proteção. Atua em indústrias, obras e empresas.",
        "Logistica": "Área responsável por organizar transporte, estoque e distribuição de produtos. O curso ensina a planejar rotas, controlar mercadorias e reduzir custos. Atua em empresas, centros de distribuição e comércios.",
        "Desenvolvimento de Sistemas" : "Curso voltado à criação de sistemas, sites e aplicativos. O aluno aprende programação, banco de dados e lógica de desenvolvimento. Pode atuar na área de tecnologia criando soluções digitais.",
        "Saneamento": "Focado no tratamento de água e esgoto e na saúde pública. O estudante aprende a analisar a qualidade da água e desenvolver sistemas de saneamento. Atua em empresas e órgãos públicos.   ",
        "Administração": "Voltado para gestão de empresas e organização de processos. O aluno aprende sobre finanças, recursos humanos e planejamento. Atua em diversos setores administrativos de empresas.",
        "Edificações": "Relaciona-se à construção civil e projetos de obras. O estudante aprende a desenhar plantas, acompanhar construções e fazer orçamentos. Atua em obras, escritórios e empresas de engenharia."
    };

    const itens = document.querySelectorAll(".card");
    const area = document.getElementById("area-descricao");
    const titulo = document.getElementById("titulo-curso");
    const texto = document.getElementById("texto-curso");

    let cursoAtual = null;

    itens.forEach(item => {
        item.addEventListener("click", () => {
            const nomeCurso = item.querySelector(".curso-nome").innerText;

            if (cursoAtual === nomeCurso) {
                area.style.display = "none";
                cursoAtual = null;
                return;
            }

            titulo.innerText = nomeCurso;
            texto.innerText = cursosInfo[nomeCurso] || "Descrição não encontrada.";

            area.style.display = "block";
            cursoAtual = nomeCurso;
        });
    });
</script>
