    <div id="area-descricao" class="area-descricao">
        <h2 id="titulo-curso"></h2>
        <p id="texto-curso"></p>
    </div>

</div>

<script>
    const cursosInfo = {
        "Desenvolvimento de Sistemas": "Curso voltado à criação de sistemas, sites e aplicativos. O aluno aprende programação, banco de dados e lógica de desenvolvimento. Pode atuar na área de tecnologia criando soluções digitais.",
        "Informatica para Internet": "Curso voltado para criação de sites e sistemas web. O aluno aprende HTML, CSS, JavaScript e noções de design e programação. Atua desenvolvendo páginas, aplicações e soluções para a internet.",
        "Edificações": "Relaciona-se à construção civil e projetos de obras. O estudante aprende a desenhar plantas, acompanhar construções e fazer orçamentos. Atua em obras, escritórios e empresas de engenharia.",
        "Administração": "Voltado para gestão de empresas e organização de processos. O aluno aprende sobre finanças, recursos humanos e planejamento. Atua em diversos setores administrativos de empresas.",
    };

    const itens = document.querySelectorAll(".card");
    const area = document.getElementById("area-descricao");
    const titulo = document.getElementById("titulo-curso");
    const texto = document.getElementById("texto-curso");

    let cursoAtual = null;

    itens.forEach(item => {
        item.addEventListener("click", () => {
            const nomeCurso = item.querySelector(".curso-nome").innerText;

            if (cursoAtual === nomeCurso) {
                area.style.display = "none";
                cursoAtual = null;
                return;
            }

            titulo.innerText = nomeCurso;
            texto.innerText = cursosInfo[nomeCurso] || "Descrição não encontrada.";

            area.style.display = "block";
            cursoAtual = nomeCurso;
        });
    });
</script>
